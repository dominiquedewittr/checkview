  thead+=`<th colspan="3" style="min-width:260px;padding:6px 10px;background:#F8FAFC;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:2px solid var(--border)">Tarea</th>`;
  let prevM='',mSpan=0,mCells=[];
  G_WEEKS.forEach((wk,i)=>{if(wk.m!==prevM){if(prevM)mCells.push({m:prevM,span:mSpan});prevM=wk.m;mSpan=1;}else mSpan++;});
  mCells.push({m:prevM,span:mSpan});
  mCells.forEach(mc=>{thead+=`<th colspan="${mc.span}" style="text-align:center;padding:5px 2px;background:#F8FAFC;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);border-left:2px solid var(--border2);border-bottom:2px solid var(--border)">${mc.m}</th>`;});
  thead+='</tr><tr>';
  thead+=`<th style="min-width:220px;padding:5px 8px;background:#F8FAFC;font-size:9px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em">Tarea</th>`;
  thead+=`<th style="width:80px;padding:5px 6px;background:#F8FAFC;font-size:9px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em">Resp.</th>`;
  thead+=`<th style="width:85px;padding:5px 6px;background:#F8FAFC;font-size:9px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em">Estado</th>`;
  G_WEEKS.forEach(wk=>{
    const tod=wk.w===0;
    thead+=`<th style="min-width:26px;width:26px;text-align:center;padding:4px 1px;background:${tod?'#EFF6FF':'#F8FAFC'};font-size:8px;color:${tod?'#0EA5E9':'var(--text3)'};font-weight:${tod?'700':'500'};border-left:${wk.ms?'2px solid #CBD5E1':'1px solid #F1F5F9'};border-bottom:1px solid var(--border)">${wk.l}</th>`;
  });
  thead+='</tr></thead>';
  const bySec={};tasks.forEach(t=>{if(!bySec[t.sec])bySec[t.sec]=[];bySec[t.sec].push(t);});
  let tbody='<tbody>';
  SEC_ORDER.forEach(sec=>{
    if(!bySec[sec]?.length)return;
    const sc=SEC_COLORS[sec]||'#374151';
    tbody+=`<tr><td colspan="${3+G_TW}" style="background:${sc};padding:5px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff">${sec}</td></tr>`;
    bySec[sec].forEach(t=>{
      const wi=semToWeek(t.si),wf=semToWeek(t.sf||t.si);
      const rc=RESP_COLOR_G[t.resp]||'#94A3B8';
      const isDone=t.status==='Completado',isProg=t.status==='En progreso';
      const statusC={'Pendiente':'#EF4444','En progreso':'#F97316','Completado':'#22C55E','Bloqueado':'#A855F7'}[t.status]||'#EF4444';
      const stT=(t.subtasks||[]).length,stD=(t.subtasks||[]).filter(s=>s.status==='Completado').length;
      let wks='';
      for(let w=0;w<G_TW;w++){
        const wk=G_WEEKS[w];const inR=w>=wi&&w<=wf;const tod=w===0;
        const felAway=t.resp==='Felipe'&&FELIPE_AWAY.has(w);
        const bl=wk.ms?'2px solid #CBD5E1':'1px solid #F1F5F9';
        if(inR){
          const br=w===wi&&w===wf?'3px':w===wi?'3px 0 0 3px':w===wf?'0 3px 3px 0':'0';
          const bw=w===wi||w===wf?'85%':'100%';
          const bg=felAway?`repeating-linear-gradient(45deg,${rc},${rc} 3px,${rc}66 3px,${rc}66 6px)`:rc;
          wks+=`<td style="padding:3px 1px;border-left:${bl};background:${tod?'#EFF6FF':''}"><div style="height:10px;border-radius:${br};width:${bw};margin:0 auto;background:${bg};opacity:${isDone?.35:isProg?.75:1};${isProg?'animation:gPulse 2s ease-in-out infinite':''}"></div></td>`;
        }else if(felAway&&t.resp==='Felipe'){
          wks+=`<td style="padding:3px 1px;border-left:${bl};background:rgba(249,115,22,.04)"></td>`;
        }else{
          wks+=`<td style="padding:3px 1px;border-left:${bl};background:${tod?'rgba(14,165,233,.03)':''}"></td>`;
        }
      }
      tbody+=`<tr onclick="jumpToTask('${t.id}')" style="cursor:pointer" onmouseover="this.querySelectorAll('td').forEach(c=>c.style.background='#F8FAFC')" onmouseout="this.querySelectorAll('td').forEach(c=>c.style.background='')">
        <td style="padding:5px 8px;border-bottom:1px solid #F1F5F9">
          <div class="g-tn ${isDone?'done':''}">${t.name}</div>
          ${stT>0?`<div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="flex:1;height:2px;background:#E2E8F0;border-radius:2px;overflow:hidden"><div style="height:100%;width:${stT?Math.round(stD/stT*100):0}%;background:${rc}"></div></div><span style="font-size:8px;color:var(--text3)">${stD}/${stT}</span></div>`:''}
        </td>
        <td style="padding:4px 6px;border-bottom:1px solid #F1F5F9"><span style="font-size:9px;font-weight:600;padding:2px 6px;border-radius:5px;background:${rc}18;color:${rc}">${t.resp||'—'}</span></td>
        <td style="padding:4px 6px;border-bottom:1px solid #F1F5F9"><span style="font-size:9px;padding:2px 6px;border-radius:5px;background:${statusC}15;color:${statusC}">${t.status}</span></td>
        ${wks}
      </tr>`;
    });
  });
  tbody+='</tbody>';
  table.innerHTML=thead+tbody;
}

// INIT
// ═══════════════════════════════════════════════

function normalizeTasks(tasks) {
  const _n = {Dom:'Dominique',Fco:'Francisco',Felipe:'Felipe',
              Dominique:'Dominique',Francisco:'Francisco'};
  function normResp(r) {
    if (!r) return r;
    return r.split('+').map(x=>_n[x.trim()]||x.trim()).join('+');
  }
  return tasks.map(t => {
    t.resp = normResp(t.resp);
    (t.subtasks||[]).forEach(st => { st.resp = normResp(st.resp); });
    return t;
  });
}

async function initApp() {
  // Mostrar loading en login
  const loginLogo = document.getElementById('login-logo');
  const loginCards = document.getElementById('login-cards');
  if (loginCards) loginCards.innerHTML = '<div style="text-align:center;color:#94A3B8;font-size:12px;padding:20px">Cargando datos...</div>';
  
  let loaded = false;
  for (let attempt = 0; attempt < 3 && !loaded; attempt++) {
    try {
      const data = await gsRead();
      if (Array.isArray(data)) { TASKS = normalizeTasks(data); loaded = true; }
    } catch(e) {
      if (attempt < 2) await new Promise(r=>setTimeout(r,1500));
    }
  }
  if (!loaded) TASKS = [];
  
  SEC_ORDER.forEach(s=>expandedIds.add('sec:'+s));
  updateDate();
  buildLoginCards();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  
  // Si no cargó, mostrar botón de reintento
  if (!loaded && loginCards) {
    loginCards.innerHTML += '<div style="text-align:center;margin-top:12px"><button onclick="initApp()" style="background:#0EA5E9;color:#fff;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:12px">🔄 Reintentar carga</button></div>';
  }
}

initApp();

// ═══════════════════════════════════════════════
// AUTO-REFRESH — Google Sheets
// Revisa cambios cada 30 seg y cuando volvés a la pestaña
// ═══════════════════════════════════════════════
let _lastKnownData = null;

async function checkForUpdates() {
  if (document.getElementById('login-screen').style.display !== 'none') return;
  try {
    const newTasks = await gsRead();
    const fresh = JSON.stringify(newTasks);
    if (!fresh || fresh === _lastKnownData) return;
    _lastKnownData = fresh;
    const changed = JSON.stringify(newTasks) !== JSON.stringify(TASKS);
    if (changed) {
      TASKS = newTasks;
      refreshCurrentView();
      renderStats();
      showSyncNotif('🔄 Datos actualizados');
    }
  } catch {}
}

function showSyncNotif(msg) {
  const notif = document.createElement('div');
  notif.textContent = msg;
  notif.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s';
  document.body.appendChild(notif);
  setTimeout(()=>notif.style.opacity='1', 10);
  setTimeout(()=>{ notif.style.opacity='0'; setTimeout(()=>notif.remove(), 300); }, 2500);
}

// Revisar cada 30 segundos
setInterval(checkForUpdates, 30000);

// Revisar cuando el usuario vuelve a la pestaña
document.addEventListener('visibilitychange', ()=>{
  if (document.visibilityState === 'visible') checkForUpdates();
});

// Guardar referencia inicial después de loadData
document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(()=>{ _lastKnownData = JSON.stringify(TASKS); }, 1500);
});
</script>
